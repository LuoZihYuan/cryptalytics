architecture: standalone

auth:
  existingSecret: mongodb-secrets

persistence:
  size: 20Gi

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "2Gi"
    cpu: "500m"

livenessProbe:
  enabled: true
  initialDelaySeconds: 180
  timeoutSeconds: 60
  periodSeconds: 30
  failureThreshold: 10

readinessProbe:
  enabled: true
  initialDelaySeconds: 120
  timeoutSeconds: 30
  periodSeconds: 15
  failureThreshold: 10